<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e2937"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <!-- Radial glow -->
    <radialGradient id="glow" cx="35%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a56db" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1e2937" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="5" height="270" rx="3" fill="#1a56db"/>

  <!-- Logo mark (globe) -->
  <g transform="translate(116, 215)">
    <circle cx="44" cy="44" r="40" fill="none" stroke="#1a56db" stroke-width="5"/>
    <ellipse cx="44" cy="44" rx="40" ry="16" fill="none" stroke="#1a56db" stroke-width="3"/>
    <line x1="4" y1="44" x2="84" y2="44" stroke="#1a56db" stroke-width="3"/>
    <line x1="44" y1="4" x2="44" y2="84" stroke="#1a56db" stroke-width="3"/>
    <circle cx="44" cy="10" r="9" fill="#1a56db"/>
    <circle cx="44" cy="10" r="4.5" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="283" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="96" fill="#ffffff" letter-spacing="-2">RoamKit</text>

  <!-- Tagline -->
  <text x="222" y="336" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="30" fill="#93aabb" letter-spacing="0.3">Free local-first travel itinerary planner</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="222" y="380" width="222" height="44" rx="22" fill="#1a56db" fill-opacity="0.18" stroke="#1a56db" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="333" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle">✓ No account needed</text>
  <!-- Pill 2 -->
  <rect x="458" y="380" width="214" height="44" rx="22" fill="#1a56db" fill-opacity="0.18" stroke="#1a56db" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="565" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle">✓ All data stays local</text>
  <!-- Pill 3 -->
  <rect x="686" y="380" width="210" height="44" rx="22" fill="#1a56db" fill-opacity="0.18" stroke="#1a56db" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="791" y="408" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle">✓ Free &amp; open source</text>

  <!-- Right side UI mockup panel -->
  <g opacity="0.55">
    <!-- Panel bg -->
    <rect x="960" y="80" width="190" height="470" rx="12" fill="#253447"/>
    <!-- Trip card 1 -->
    <rect x="975" y="100" width="160" height="70" rx="8" fill="#2d4a6e"/>
    <rect x="975" y="100" width="5" height="70" rx="3" fill="#3b82f6"/>
    <rect x="988" y="116" width="90" height="10" rx="5" fill="#ffffff" opacity="0.7"/>
    <rect x="988" y="133" width="60" height="8" rx="4" fill="#93aabb" opacity="0.5"/>
    <rect x="988" y="148" width="75" height="7" rx="3" fill="#93aabb" opacity="0.4"/>
    <!-- Trip card 2 -->
    <rect x="975" y="182" width="160" height="70" rx="8" fill="#2d4a6e"/>
    <rect x="975" y="182" width="5" height="70" rx="3" fill="#10b981"/>
    <rect x="988" y="198" width="100" height="10" rx="5" fill="#ffffff" opacity="0.7"/>
    <rect x="988" y="215" width="70" height="8" rx="4" fill="#93aabb" opacity="0.5"/>
    <rect x="988" y="230" width="80" height="7" rx="3" fill="#93aabb" opacity="0.4"/>
    <!-- Trip card 3 -->
    <rect x="975" y="264" width="160" height="70" rx="8" fill="#2d4a6e"/>
    <rect x="975" y="264" width="5" height="70" rx="3" fill="#f59e0b"/>
    <rect x="988" y="280" width="85" height="10" rx="5" fill="#ffffff" opacity="0.7"/>
    <rect x="988" y="297" width="55" height="8" rx="4" fill="#93aabb" opacity="0.5"/>
    <rect x="988" y="312" width="70" height="7" rx="3" fill="#93aabb" opacity="0.4"/>
    <!-- Section rows -->
    <rect x="975" y="350" width="160" height="32" rx="6" fill="#1e2937" opacity="0.6"/>
    <rect x="988" y="362" width="80" height="8" rx="4" fill="#93aabb" opacity="0.5"/>
    <rect x="975" y="390" width="160" height="32" rx="6" fill="#1e2937" opacity="0.6"/>
    <rect x="988" y="402" width="65" height="8" rx="4" fill="#93aabb" opacity="0.5"/>
    <rect x="975" y="430" width="160" height="32" rx="6" fill="#1e2937" opacity="0.6"/>
    <rect x="988" y="442" width="90" height="8" rx="4" fill="#93aabb" opacity="0.5"/>
  </g>

  <!-- Bottom URL -->
  <text x="115" y="570" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#93aabb" opacity="0.7">github.com/jrcstreams/roamkit</text>
</svg>
